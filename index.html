<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creatividades</title>
<style>

  /* ============================================================
     1) TU CONTENIDO VIVE AQUÍ ABAJO, EN EL <script> (busca CONTENIDO).
        Para añadir algo nuevo:
        - Copia tu foto o vídeo dentro de la carpeta /media
        - Añade una línea a la lista con su nombre de archivo
     ============================================================ */

  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg: #ffffff;
    --bg-frame: #f4f9fc;
    --ink: #10222c;
    --ink-dim: #6f8896;
    --blue: #29abe2;
    --line: #dcebf3;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
  }

  .app{
    position: relative;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* barra superior */
  header{
    display:flex;
    align-items:center;
    justify-content: space-between;
    padding: 22px 28px;
    z-index: 5;
  }

  .brand{
    display:flex;
    align-items:baseline;
    gap: 10px;
    letter-spacing: 0.02em;
  }
  .brand .mark{
    font-weight:700;
    font-size: 15px;
    letter-spacing: 0.08em;
  }
  .brand .sub{
    color: var(--ink-dim);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }

  .meta{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-dim);
    text-align: right;
    line-height: 1.5;
  }

  /* escenario */
  .stage{
    position: relative;
    flex: 1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 0 90px 90px;
    min-height: 0;
  }

  .frame{
    position: relative;
    max-width: 100%;
    max-height: 100%;
    border: 1px solid var(--line);
    background: var(--bg-frame);
    padding: 10px;
    display:flex;
  }

  .frame img,
  .frame video{
    max-width: 78vw;
    max-height: 72dvh;
    display:block;
    object-fit: contain;
  }

  .frame.loading{ opacity: 0.4; }

  /* flechas */
  .nav-btn{
    position:absolute;
    top:0; bottom:0;
    width: 90px;
    display:flex;
    align-items:center;
    justify-content:center;
    background: transparent;
    border:none;
    cursor:pointer;
    color: var(--ink-dim);
    transition: color 0.15s ease;
  }
  .nav-btn:hover{ color: var(--blue); }
  .nav-btn.prev{ left:0; }
  .nav-btn.next{ right:0; }
  .nav-btn svg{ width: 22px; height: 22px; }

  /* pie: contador + tiras de miniaturas */
  footer{
    padding: 16px 28px 24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 14px;
  }

  .counter{
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--ink-dim);
  }
  .counter b{ color: var(--blue); font-weight: 500; }

  .dots{
    display:flex;
    gap: 6px;
  }
  .dot{
    width: 20px;
    height: 3px;
    background: var(--line);
    cursor:pointer;
    transition: background 0.15s ease;
  }
  .dot.active{ background: var(--blue); }

  /* mensaje si no hay contenido */
  .empty{
    text-align:center;
    color: var(--ink-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.8;
  }
  .empty b{ color: var(--ink); }

  /* panel de métricas de Meta Ads */
  .stats{
    display:flex;
    gap: 28px;
    padding-top: 4px;
  }
  .stat{
    text-align:center;
  }
  .stat .val{
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
  }
  .stat .lab{
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 3px;
  }

  @media (max-width: 720px){
    .stats{ gap: 16px; flex-wrap: wrap; justify-content:center; }
  }

  @media (max-width: 720px){
    .stage{ padding: 0 46px 60px; }
    .nav-btn{ width: 46px; }
    .frame img, .frame video{ max-width: 88vw; }
    header{ flex-direction:column; align-items:flex-start; gap:6px; }
    .meta{ text-align:left; }
  }

</style>
</head>
<body>

<div class="app">
  <header>
    <div class="brand">
      <span class="mark">CREATIVIDADES</span>
      <span class="sub" id="project-sub">galería de anuncios</span>
    </div>
    <div class="meta" id="meta-box"></div>
  </header>

  <div class="stage" id="stage">
    <button class="nav-btn prev" id="btn-prev" aria-label="Anterior">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>

    <div class="frame" id="frame"></div>

    <button class="nav-btn next" id="btn-next" aria-label="Siguiente">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <footer>
    <div class="counter" id="counter"></div>
    <div class="stats" id="stats"></div>
    <div class="dots" id="dots"></div>
  </footer>
</div>

<script>

  /* ============================================================
     CONTENIDO
     Cada línea es una foto o vídeo con sus métricas de Meta Ads.
     Copia el archivo dentro de /media y añade una línea aquí.

     type: "image" o "video"

     "IMG 1_Regalo-Nevera-SUBS" e "IMG_2_Regalo-Nevera-SUBS"
     aparecían dos veces en el CSV (probablemente dos ubicaciones/
     públicos distintos para el mismo anuncio). Sumé impresiones,
     clics, alcance, gasto, resultados y valor, y recalculé coste
     por resultado y frecuencia/CTR ponderados por alcance.

     "IMG_3_Regalo-Nevera-JUNIO" se dejó fuera a propósito (estuvo
     muy poco tiempo activo, según indicaste).
     ============================================================ */

  const CONTENIDO = [
    {
      type: "image", src: "media/IMG_1_Regalo-Nevera-JUNIO.jpg", nota: "IMG 1 · Regalo Nevera JUNIO",
      metricas: { impresiones: "201.202", alcance: "79.366", frecuencia: "2,54", clics: "3.749", ctr: "1,86%", gasto: "645,51 €", resultados: "314", costeResultado: "2,06 €", valorResultados: "15.193,18 €" }
    },
    {
      type: "image", src: "media/IMG_2_Regalo-Nevera-JUNIO.jpg", nota: "IMG 2 · Regalo Nevera JUNIO",
      metricas: { impresiones: "5.726", alcance: "3.925", frecuencia: "1,46", clics: "100", ctr: "1,75%", gasto: "26,31 €", resultados: "19", costeResultado: "1,38 €", valorResultados: "892,98 €" }
    },
    {
      type: "video", src: "media/VID_1_Regalo-Nevera-JUNIO.mp4", nota: "VID 1 · Regalo Nevera JUNIO",
      metricas: { impresiones: "470.894", alcance: "140.474", frecuencia: "3,35", clics: "4.302", ctr: "0,91%", gasto: "1.564,86 €", resultados: "433", costeResultado: "3,61 €", valorResultados: "19.847,45 €" }
    },
    {
      type: "image", src: "media/IMG_1_Regalo-Nevera-SUBS.jpg", nota: "IMG 1 · Regalo Nevera SUBS",
      metricas: { impresiones: "732.868", alcance: "163.708", frecuencia: "4,48", clics: "5.778", ctr: "0,81%", gasto: "2.912,27 €", resultados: "482", costeResultado: "6,04 €", valorResultados: "23.464,00 €" }
    },
    {
      type: "image", src: "media/IMG_2_Regalo-Nevera-SUBS.jpg", nota: "IMG 2 · Regalo Nevera SUBS",
      metricas: { impresiones: "169.410", alcance: "50.337", frecuencia: "3,37", clics: "1.330", ctr: "0,81%", gasto: "754,52 €", resultados: "155", costeResultado: "4,87 €", valorResultados: "7.578,77 €" }
    },
    {
      type: "image", src: "media/IMG_3_Regalo-Nevera-SUBS.jpg", nota: "IMG 3 · Regalo Nevera SUBS",
      metricas: { impresiones: "43.138", alcance: "22.028", frecuencia: "1,96", clics: "481", ctr: "1,12%", gasto: "152,84 €", resultados: "43", costeResultado: "3,55 €", valorResultados: "1.879,53 €" }
    },
    {
      type: "image", src: "media/IMG_4_Regalo-Nevera-SUBS.jpg", nota: "IMG 4 · Regalo Nevera SUBS",
      metricas: { impresiones: "6.331", alcance: "4.844", frecuencia: "1,31", clics: "56", ctr: "0,88%", gasto: "20,04 €", resultados: "4", costeResultado: "5,01 €", valorResultados: "129,99 €" }
    },
    {
      type: "image", src: "media/IMG_5_Regalo-Nevera-SUBS.jpg", nota: "IMG 5 · Regalo Nevera SUBS",
      metricas: { impresiones: "27.532", alcance: "18.250", frecuencia: "1,51", clics: "262", ctr: "0,95%", gasto: "80,64 €", resultados: "23", costeResultado: "3,51 €", valorResultados: "1.071,01 €" }
    },
    // 👇 copia y pega esta plantilla para añadir una nueva:
    // {
    //   type: "image", src: "media/mi-archivo.jpg", nota: "Descripción",
    //   metricas: { impresiones: "12.400", alcance: "9.800", frecuencia: "1,27", clics: "310", ctr: "2,5%", gasto: "145,00 €", resultados: "42", costeResultado: "3,45 €", valorResultados: "890,00 €" }
    // },
  ];

  const NOMBRE_PROYECTO = "Neverita - JUN2026"; // nombre de campaña

  // ============================================================

  let idx = 0;
  const frame   = document.getElementById('frame');
  const counter = document.getElementById('counter');
  const stats   = document.getElementById('stats');
  const dots    = document.getElementById('dots');
  const sub     = document.getElementById('project-sub');
  const metaBox = document.getElementById('meta-box');

  sub.textContent = NOMBRE_PROYECTO;

  const fecha = new Date().toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
  metaBox.innerHTML = `${CONTENIDO.length} elementos<br>Actualizado ${fecha}`;

  function render(){
    frame.innerHTML = '';

    if (CONTENIDO.length === 0){
      frame.innerHTML = `<div class="empty"><b>Aún no hay nada aquí.</b><br>Copia tus archivos en /media y añádelos<br>a la lista CONTENIDO en index.html.</div>`;
      counter.textContent = '';
      stats.innerHTML = '';
      dots.innerHTML = '';
      return;
    }

    const item = CONTENIDO[idx];
    let el;

    if (item.type === 'video'){
      el = document.createElement('video');
      el.src = item.src;
      el.controls = true;
      el.autoplay = true;
      el.loop = true;
      el.muted = true;
      el.playsInline = true;
    } else {
      el = document.createElement('img');
      el.src = item.src;
      el.alt = item.nota || '';
    }

    frame.appendChild(el);

    counter.innerHTML = `<b>${String(idx+1).padStart(2,'0')}</b> / ${String(CONTENIDO.length).padStart(2,'0')} — ${item.nota || ''}`;

    const m = item.metricas || {};
    const campos = [
      ['impresiones', 'Impresiones'],
      ['alcance', 'Alcance'],
      ['frecuencia', 'Frecuencia'],
      ['clics', 'Clics'],
      ['ctr', 'CTR'],
      ['gasto', 'Gasto'],
      ['resultados', 'Resultados'],
      ['costeResultado', 'Coste/result.'],
      ['valorResultados', 'Valor result.'],
    ];
    stats.innerHTML = campos.map(([key, label]) => `
      <div class="stat">
        <div class="val">${m[key] ?? '—'}</div>
        <div class="lab">${label}</div>
      </div>
    `).join('');

    dots.innerHTML = '';
    CONTENIDO.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === idx ? ' active' : '');
      d.addEventListener('click', () => { idx = i; render(); });
      dots.appendChild(d);
    });
  }

  function go(delta){
    if (CONTENIDO.length === 0) return;
    idx = (idx + delta + CONTENIDO.length) % CONTENIDO.length;
    render();
  }

  document.getElementById('btn-prev').addEventListener('click', () => go(-1));
  document.getElementById('btn-next').addEventListener('click', () => go(1));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') go(-1);
    if (e.key === 'ArrowRight') go(1);
  });

  // deslizar en móvil
  let touchX = null;
  document.getElementById('stage').addEventListener('touchstart', e => touchX = e.touches[0].clientX);
  document.getElementById('stage').addEventListener('touchend', e => {
    if (touchX === null) return;
    const diff = e.changedTouches[0].clientX - touchX;
    if (Math.abs(diff) > 50) go(diff > 0 ? -1 : 1);
    touchX = null;
  });

  render();

</script>
</body>
</html>
