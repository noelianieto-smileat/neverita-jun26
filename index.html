<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smileat · Neverita 2026</title>
<style>

  /* ============================================================
     1) TU CONTENIDO VIVE EN EL <script>, AL FINAL DEL ARCHIVO
        (busca CONTENIDO). Para añadir algo nuevo:
        - Copia tu foto o vídeo dentro de la carpeta /media
        - Añade un bloque a la lista con sus métricas
        - El ORDEN en que escribas los bloques es el orden en que
          se muestran → colócalo donde le corresponda de mejor a
          peor resultado.
     ============================================================ */

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --brand: #29abe2;
    --ink: #10222c;
    --ink-dim: #7c8a96;
    --page-bg: #eef3f6;
    --card-bg: #ffffff;
    --chip-bg: #f3f6f9;
    --line: #e3eaf0;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0;
    background: var(--page-bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-variant-numeric: tabular-nums;
  }

  /* cabecera */
  header{
    background: var(--brand);
    color: #ffffff;
    padding: 28px 24px;
    text-align: center;
  }
  header h1{
    margin: 0;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.03em;
  }
  header p{
    margin: 6px 0 0;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
  }

  /* lista de creatividades */
  main{
    max-width: 780px;
    margin: 0 auto;
    padding: 28px 16px 60px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .card{
    position: relative;
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(16,34,44,0.06);
  }

  .rank{
    position: absolute;
    top: 14px;
    left: 14px;
    background: var(--brand);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
    z-index: 2;
  }

  .media{
    background: #dfe7ec;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .media img, .media video{
    width: 100%;
    max-height: 460px;
    object-fit: contain;
    display:block;
    background: #10222c;
  }

  .card-body{
    padding: 16px 18px 18px;
  }

  .card-title{
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin: 0 0 14px;
  }

  .stats{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .stat{
    background: var(--chip-bg);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }
  .stat .val{
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
  }
  .stat .lab{
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 4px;
  }

  footer{
    text-align:center;
    padding: 0 16px 40px;
    font-size: 12px;
    color: var(--ink-dim);
  }

  @media (max-width: 480px){
    .stats{ grid-template-columns: repeat(2, 1fr); }
    header h1{ font-size: 18px; }
  }

</style>
</head>
<body>

  <header>
    <h1 id="titulo"></h1>
    <p id="subtitulo"></p>
  </header>

  <main id="lista"></main>

  <footer id="pie"></footer>

<script>

  /* ============================================================
     CONTENIDO
     Ya están ordenados de MEJOR a PEOR resultado (según
     "Resultados" del CSV de Meta Ads). Si añades una creatividad
     nueva, colócala en el bloque que le corresponda según sus
     resultados.

     "IMG 1_Regalo-Nevera-SUBS" e "IMG_2_Regalo-Nevera-SUBS"
     aparecían dos veces en el CSV (dos ubicaciones/públicos
     distintos). Sumé impresiones, clics, alcance, gasto,
     resultados y valor, y recalculé coste por resultado y
     frecuencia/CTR ponderados por alcance.

     "IMG_3_Regalo-Nevera-JUNIO" se dejó fuera a propósito
     (estuvo muy poco tiempo activa).
     ============================================================ */

  const CONTENIDO = [
    {
      type: "image", src: "media/IMG_1_Regalo-Nevera-SUBS.jpg", nota: "IMG 1 · Regalo Nevera SUBS",
      metricas: { impresiones: "732.868", alcance: "163.708", frecuencia: "4,48", clics: "5.778", ctr: "0,81%", gasto: "2.912,27 €", resultados: "482", costeResultado: "6,04 €", valorResultados: "23.464,00 €" }
    },
    {
      type: "video", src: "media/VID_1_Regalo-Nevera-JUNIO.mp4", nota: "VID 1 · Regalo Nevera JUNIO",
      metricas: { impresiones: "470.894", alcance: "140.474", frecuencia: "3,35", clics: "4.302", ctr: "0,91%", gasto: "1.564,86 €", resultados: "433", costeResultado: "3,61 €", valorResultados: "19.847,45 €" }
    },
    {
      type: "image", src: "media/IMG_1_Regalo-Nevera-JUNIO.jpg", nota: "IMG 1 · Regalo Nevera JUNIO",
      metricas: { impresiones: "201.202", alcance: "79.366", frecuencia: "2,54", clics: "3.749", ctr: "1,86%", gasto: "645,51 €", resultados: "314", costeResultado: "2,06 €", valorResultados: "15.193,18 €" }
    },
    {
      type: "image", src: "media/IMG_2_Regalo-Nevera-SUBS.jpg", nota: "IMG 2 · Regalo Nevera SUBS",
      metricas: { impresiones: "169.410", alcance: "50.337", frecuencia: "3,37", clics: "1.330", ctr: "0,81%", gasto: "754,52 €", resultados: "155", costeResultado: "4,87 €", valorResultados: "7.578,77 €" }
    },
    {
      type: "image", src: "media/IMG_3_Regalo-Nevera-SUBS.jpg", nota: "IMG 3 · Regalo Nevera SUBS",
      metricas: { impresiones: "43.138", alcance: "22.028", frecuencia: "1,96", clics: "481", ctr: "1,12%", gasto: "152,84 €", resultados: "43", costeResultado: "3,55 €", valorResultados: "1.879,53 €" }
    },
    {
      type: "image", src: "media/IMG_5_Regalo-Nevera-SUBS.jpg", nota: "IMG 5 · Regalo Nevera SUBS",
      metricas: { impresiones: "27.532", alcance: "18.250", frecuencia: "1,51", clics: "262", ctr: "0,95%", gasto: "80,64 €", resultados: "23", costeResultado: "3,51 €", valorResultados: "1.071,01 €" }
    },
    {
      type: "image", src: "media/IMG_2_Regalo-Nevera-JUNIO.jpg", nota: "IMG 2 · Regalo Nevera JUNIO",
      metricas: { impresiones: "5.726", alcance: "3.925", frecuencia: "1,46", clics: "100", ctr: "1,75%", gasto: "26,31 €", resultados: "19", costeResultado: "1,38 €", valorResultados: "892,98 €" }
    },
    {
      type: "image", src: "media/IMG_4_Regalo-Nevera-SUBS.jpg", nota: "IMG 4 · Regalo Nevera SUBS",
      metricas: { impresiones: "6.331", alcance: "4.844", frecuencia: "1,31", clics: "56", ctr: "0,88%", gasto: "20,04 €", resultados: "4", costeResultado: "5,01 €", valorResultados: "129,99 €" }
    },
    // 👇 copia y pega esta plantilla para añadir una nueva (colócala en su sitio según resultados):
    // {
    //   type: "image", src: "media/mi-archivo.jpg", nota: "Descripción",
    //   metricas: { impresiones: "12.400", alcance: "9.800", frecuencia: "1,27", clics: "310", ctr: "2,5%", gasto: "145,00 €", resultados: "42", costeResultado: "3,45 €", valorResultados: "890,00 €" }
    // },
  ];

  const TITULO = "SMILEAT · NEVERITA 2026";
  const SUBTITULO = "Meta Ads · 15 jun – 21 jul 2026 · ordenado de mejor a peor resultado";

  // ============================================================

  document.getElementById('titulo').textContent = TITULO;
  document.getElementById('subtitulo').textContent = SUBTITULO;
  document.getElementById('pie').textContent = `${CONTENIDO.length} creatividades`;

  const lista = document.getElementById('lista');

  const campos = [
    ['resultados', 'Resultados'],
    ['gasto', 'Gasto'],
    ['costeResultado', 'Coste/result.'],
    ['impresiones', 'Impresiones'],
    ['alcance', 'Alcance'],
    ['frecuencia', 'Frecuencia'],
    ['clics', 'Clics'],
    ['ctr', 'CTR'],
    ['valorResultados', 'Valor result.'],
  ];

  CONTENIDO.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card';

    const mediaEl = item.type === 'video'
      ? `<video src="${item.src}" controls playsinline></video>`
      : `<img src="${item.src}" alt="${item.nota || ''}">`;

    const m = item.metricas || {};
    const statsHtml = campos.map(([key, label]) => `
      <div class="stat">
        <div class="val">${m[key] ?? '—'}</div>
        <div class="lab">${label}</div>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="rank">#${i + 1}</div>
      <div class="media">${mediaEl}</div>
      <div class="card-body">
        <p class="card-title">${item.nota || ''}</p>
        <div class="stats">${statsHtml}</div>
      </div>
    `;

    lista.appendChild(card);
  });

</script>
</body>
</html>
